<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | SpeedType Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@500;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #050816;
      --primary-color: #00E5FF;
      --primary-glow: rgba(0, 229, 255, 0.35);
      --secondary-color: #7B61FF;
      --secondary-glow: rgba(123, 97, 255, 0.3);
      --text-color: #FFFFFF;
      --text-muted: #8E9AA8;
      --font-heading: 'Orbitron', sans-serif;
      --font-body: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Glowing Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 1;
      opacity: 0.5;
    }

    .orb-primary {
      width: 400px;
      height: 400px;
      background: var(--primary-glow);
      top: -100px;
      left: -100px;
      animation: float-slow 15s infinite alternate ease-in-out;
    }

    .orb-secondary {
      width: 500px;
      height: 500px;
      background: var(--secondary-glow);
      bottom: -150px;
      right: -150px;
      animation: float-slow 20s infinite alternate-reverse ease-in-out;
    }

    @keyframes float-slow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    /* Glassmorphic Container */
    .error-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 50px 40px;
      border-radius: 24px;
      max-width: 550px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      z-index: 10;
      position: relative;
    }

    /* Glowing 404 Header */
    .error-code {
      font-family: var(--font-heading);
      font-size: 8rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 15px var(--primary-glow));
      animation: pulse-glow 2.5s infinite alternate ease-in-out;
    }

    @keyframes pulse-glow {
      0% { filter: drop-shadow(0 0 10px var(--primary-glow)); }
      100% { filter: drop-shadow(0 0 25px var(--primary-glow)); }
    }

    .error-title {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      color: var(--text-color);
    }

    /* Typewriter Text area */
    .error-desc {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 40px;
      min-height: 50px;
      display: inline-block;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 15px;
      background-color: var(--primary-color);
      margin-left: 4px;
      animation: blink 0.8s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Premium Button styling */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
      color: #050816;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--primary-glow);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px var(--primary-glow);
      filter: brightness(1.1);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    .btn svg {
      transition: transform 0.3s ease;
    }

    .btn:hover svg {
      transform: translateX(-4px);
    }
  </style>
</head>
<body>
  <!-- Ambient background glow -->
  <div class="orb orb-primary"></div>
  <div class="orb orb-secondary"></div>

  <!-- Content panel -->
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Typos Detected</h1>
    <div class="error-desc" id="typewriter"></div><span class="cursor"></span>
    
    <div>
      <a id="home-link" href="/rapid-typing-speed/" class="btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Return to Home
      </a>
    </div>
  </div>

  <script>
    // 1. Correct Path adjustment for Localhost testing
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.port !== "") {
      const link = document.getElementById('home-link');
      if (link) {
        link.href = '/';
      }
    }

    // 2. Typewriter Effect
    const text = "Error 404: Your keystrokes wandered off target and led into uncharted space...";
    const typewriterEl = document.getElementById("typewriter");
    let i = 0;

    function type() {
      if (i < text.length) {
        typewriterEl.textContent += text.charAt(i);
        i++;
        setTimeout(type, 35);
      }
    }

    // Start typing after container renders
    setTimeout(type, 500);
  </script>
</body>
</html>
